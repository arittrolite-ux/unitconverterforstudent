<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator</title>

<link rel="stylesheet" href="style.css">

<style>

.calculator{
    max-width:900px;
    margin:auto;
    background:#111827;
    padding:25px;
    border-radius:20px;
    border:1px solid #334155;
}

.display{
    width:calc(100% - 30px);
    height:90px;
    font-size:40px;
    text-align:right;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    margin-bottom:20px;
    font-weight:bold;
letter-spacing:1px;
}

.calc-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

.calc-btn{
    height:65px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#1e293b;
    color:white;
    font-size:20px;
    font-weight:bold;
    transition:.2s;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
}

.calc-btn:hover{
    transform:translateY(-3px) scale(1.03);
    background:#2563eb;
}
.home-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.home-btn:hover{
    background:#3b82f6;
}
  .operator{
    background:linear-gradient(135deg,#7c3aed,#9333ea);
}

.equal{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

.clear{
    background:linear-gradient(135deg,#dc2626,#ef4444);
}

.function{
    background:linear-gradient(135deg,#0891b2,#06b6d4);
}
    
</style>

</head>

<body>

<header class="hero">

<h1>🧮 Scientific Calculator</h1>

<p>
Engineering, Physics, Mathematics and Chemistry Calculator
</p>

<a href="index.html" class="home-btn">
🏠 Home
</a>

</header>

<div class="container">

<div class="calculator">

<input
type="text"
id="display"
class="display"
readonly>

<div class="calc-grid">

<button class="calc-btn">MR</button>
<button class="calc-btn">MC</button>
<button class="calc-btn">M+</button>
<button class="calc-btn">M-</button>
<button class="calc-btn clear" onclick="clearDisplay()">C</button>

<button class="calc-btn" onclick="addValue('7')">7</button>
<button class="calc-btn" onclick="addValue('8')">8</button>
<button class="calc-btn" onclick="addValue('9')">9</button>
<button class="calc-btn operator" onclick="addValue('/')">÷</button>
<button class="calc-btn" onclick="backspace()">⌫</button>

<button class="calc-btn" onclick="addValue('4')">4</button>
<button class="calc-btn" onclick="addValue('5')">5</button>
<button class="calc-btn" onclick="addValue('6')">6</button>
<button class="calc-btn operator" onclick="addValue('*')">×</button>
<button class="calc-btn" onclick="addValue('(')">(</button>

<button class="calc-btn" onclick="addValue('1')">1</button>
<button class="calc-btn" onclick="addValue('2')">2</button>
<button class="calc-btn" onclick="addValue('3')">3</button>
<button class="calc-btn operator" onclick="addValue('-')">−</button>
<button class="calc-btn" onclick="addValue(')')">)</button>

<button class="calc-btn" onclick="addValue('0')">0</button>
<button class="calc-btn" onclick="addValue('.')">.</button>
<button class="calc-btn equal" onclick="calculate()">=</button>
<button class="calc-btn operator" onclick="addValue('+')">+</button>
<button class="calc-btn function" onclick="addValue('%')">%</button>

<button class="calc-btn function" onclick="addValue('Math.PI')">π</button>
<button class="calc-btn function" onclick="addValue('Math.E')">e</button>
<button class="calc-btn function" onclick="sqrt()">√</button>
<button class="calc-btn function" onclick="square()">x²</button>
<button class="calc-btn function" onclick="power()">xʸ</button>

<button class="calc-btn function" onclick="sin()">sin</button>
<button class="calc-btn function" onclick="cos()">cos</button>
<button class="calc-btn function" onclick="tan()">tan</button>
<button class="calc-btn function" onclick="log()">log</button>
<button class="calc-btn function" onclick="ln()">ln</button>

</div>

</div>

</div>

<script>

function addValue(value){
document.getElementById("display").value+=value;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function backspace(){
let display=
document.getElementById("display");

display.value=
display.value.slice(0,-1);
}

function calculate(){

try{

document.getElementById("display").value=
eval(
document.getElementById("display").value
);

}

catch{

alert("Invalid Expression");

}

}

function sqrt(){

const display =
document.getElementById("display");

const value =
Number(display.value);

if(isNaN(value)){
alert("Please enter a number first");
return;
}

display.value =
Math.sqrt(value);

}

function square(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
value*value;

}

function power(){

let x=
prompt("Base");

let y=
prompt("Power");

document.getElementById("display").value=
Math.pow(x,y);

}

function sin(){

const display =
document.getElementById("display");

const value =
Number(display.value);

if(isNaN(value)){
alert("Please enter a number first");
return;
}

display.value =
Math.sin(value * Math.PI / 180);

}

function cos(){

const display =
document.getElementById("display");

const value =
Number(display.value);

if(isNaN(value)){
alert("Please enter a number first");
return;
}

display.value =
Math.cos(value * Math.PI / 180);

}

function tan(){

const display =
document.getElementById("display");

const value =
Number(display.value);

if(isNaN(value)){
alert("Please enter a number first");
return;
}

display.value =
Math.tan(value * Math.PI / 180);

}

function log(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.log10(value);

}

function ln(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.log(value);

}
    document.addEventListener("keydown",function(event){

const key=event.key;

if("0123456789+-*/().%".includes(key)){
addValue(key);
}

if(key==="Enter"){
calculate();
}

if(key==="Backspace"){
backspace();
}

if(key==="Escape"){
clearDisplay();
}

});

</script>

</body>
</html>
