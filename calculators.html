<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator</title>

<link rel="stylesheet" href="style.css">

<style>

.calculator{
    max-width:700px;
    margin:auto;
    background:#111827;
    padding:25px;
    border-radius:20px;
    border:1px solid #334155;
}

.display{
    width:100%;
    height:70px;
    font-size:30px;
    text-align:right;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    margin-bottom:20px;
}

.calc-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

.calc-btn{
    padding:18px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1e293b;
    color:white;
}

.calc-btn:hover{
    background:#2563eb;
}

</style>

</head>

<body>

<header class="hero">
<h1>🧮 Scientific Calculator</h1>

<p>
Engineering, Physics, Mathematics and Chemistry Calculator
</p>

</header>

<div class="container">

<div class="calculator">

<input
type="text"
id="display"
class="display"
readonly>

<div class="calc-grid">

<button class="calc-btn" onclick="addValue('7')">7</button>
<button class="calc-btn" onclick="addValue('8')">8</button>
<button class="calc-btn" onclick="addValue('9')">9</button>
<button class="calc-btn" onclick="addValue('/')">÷</button>
<button class="calc-btn" onclick="clearDisplay()">C</button>

<button class="calc-btn" onclick="addValue('4')">4</button>
<button class="calc-btn" onclick="addValue('5')">5</button>
<button class="calc-btn" onclick="addValue('6')">6</button>
<button class="calc-btn" onclick="addValue('*')">×</button>
<button class="calc-btn" onclick="addValue('(')">(</button>

<button class="calc-btn" onclick="addValue('1')">1</button>
<button class="calc-btn" onclick="addValue('2')">2</button>
<button class="calc-btn" onclick="addValue('3')">3</button>
<button class="calc-btn" onclick="addValue('-')">−</button>
<button class="calc-btn" onclick="addValue(')')">)</button>

<button class="calc-btn" onclick="addValue('0')">0</button>
<button class="calc-btn" onclick="addValue('.')">.</button>
<button class="calc-btn" onclick="calculate()">=</button>
<button class="calc-btn" onclick="addValue('+')">+</button>
<button class="calc-btn" onclick="backspace()">⌫</button>

<button class="calc-btn" onclick="addValue('Math.PI')">π</button>
<button class="calc-btn" onclick="addValue('Math.E')">e</button>
<button class="calc-btn" onclick="sqrt()">√</button>
<button class="calc-btn" onclick="square()">x²</button>
<button class="calc-btn" onclick="power()">xʸ</button>

<button class="calc-btn" onclick="sin()">sin</button>
<button class="calc-btn" onclick="cos()">cos</button>
<button class="calc-btn" onclick="tan()">tan</button>
<button class="calc-btn" onclick="log()">log</button>
<button class="calc-btn" onclick="ln()">ln</button>

</div>

</div>

</div>

<script>

function addValue(value){
document.getElementById("display").value+=value;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function backspace(){
let display=
document.getElementById("display");

display.value=
display.value.slice(0,-1);
}

function calculate(){

try{

document.getElementById("display").value=
eval(
document.getElementById("display").value
);

}

catch{

alert("Invalid Expression");

}

}

function sqrt(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.sqrt(value);

}

function square(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
value*value;

}

function power(){

let x=
prompt("Base");

let y=
prompt("Power");

document.getElementById("display").value=
Math.pow(x,y);

}

function sin(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.sin(
value*Math.PI/180
);

}

function cos(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.cos(
value*Math.PI/180
);

}

function tan(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.tan(
value*Math.PI/180
);

}

function log(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.log10(value);

}

function ln(){

let value=
parseFloat(
document.getElementById("display").value
);

document.getElementById("display").value=
Math.log(value);

}

</script>

</body>
</html>
